<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0E1A"/>
      <stop offset="100%" stop-color="#151c2e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a84b"/>
      <stop offset="100%" stop-color="#c2782a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#d4a84b" stroke-width="1">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="400" y1="0" x2="1200" y2="420"/>
    <line x1="800" y1="0" x2="1200" y2="210"/>
    <line x1="0" y1="210" x2="800" y2="630"/>
    <line x1="0" y1="420" x2="400" y2="630"/>
  </g>
  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#gold)"/>
  <!-- MilCalc title -->
  <text x="600" y="230" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-weight="700" fill="#d4a84b">MilCalc</text>
  <!-- Tagline -->
  <text x="600" y="300" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="32" fill="#8a9ab5">Your military retirement, fully decoded.</text>
  <!-- Feature pills -->
  <g transform="translate(600, 400)">
    <!-- Pension pill -->
    <rect x="-480" y="-22" width="200" height="44" rx="22" fill="none" stroke="#c2782a" stroke-width="1.5" opacity="0.6"/>
    <text x="-380" y="7" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#c2782a">Pension</text>
    <!-- VA Disability pill -->
    <rect x="-240" y="-22" width="200" height="44" rx="22" fill="none" stroke="#c2782a" stroke-width="1.5" opacity="0.6"/>
    <text x="-140" y="7" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#c2782a">VA Disability</text>
    <!-- State Taxes pill -->
    <rect x="0" y="-22" width="200" height="44" rx="22" fill="none" stroke="#c2782a" stroke-width="1.5" opacity="0.6"/>
    <text x="100" y="7" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#c2782a">State Taxes</text>
    <!-- Income Gap pill -->
    <rect x="240" y="-22" width="200" height="44" rx="22" fill="none" stroke="#c2782a" stroke-width="1.5" opacity="0.6"/>
    <text x="340" y="7" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#c2782a">Income Gap</text>
  </g>
  <!-- Bottom tagline -->
  <text x="600" y="530" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#5a6070">Free. Offline. Built by veterans.</text>
  <!-- Bottom accent line -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#gold)"/>
</svg>
